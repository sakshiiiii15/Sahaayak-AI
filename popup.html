<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sahaayak AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      font-family: Arial, sans-serif;
      background-color: #fdf6f9;
      padding: 20px;
      color: #333;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      color: #6a1b9a;
      font-size: 24px;
      margin-bottom: 5px;
    }

    .header p {
      color: #888;
      font-size: 12px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .result-box {
      padding: 15px;
      border-radius: 12px;
      display: none;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .result-box.show {
      display: block;
    }

    .result-box.scam {
      background-color: #ffebee;
      border-left: 4px solid red;
    }

    .result-box.suspicious {
      background-color: #fff8e1;
      border-left: 4px solid orange;
    }

    .result-box.safe {
      background-color: #e8f5e9;
      border-left: 4px solid green;
    }

    .result-status {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .result-status.scam {
      color: red;
    }

    .result-status.suspicious {
      color: orange;
    }

    .result-status.safe {
      color: green;
    }

    .result-message {
      font-size: 14px;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .result-score {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }

    .listen-button {
      padding: 10px 15px;
      background-color: #ba68c8;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    .listen-button:hover {
      background-color: #8e24aa;
    }

    .loading {
      text-align: center;
      color: #999;
      font-size: 14px;
      display: none;
      padding: 20px;
    }

    .loading.show {
      display: block;
    }

    .error-box {
      padding: 15px;
      background-color: #f3e5f5;
      border-radius: 12px;
      color: #d32f2f;
      font-size: 13px;
      display: none;
      border-left: 4px solid #d32f2f;
    }

    .error-box.show {
      display: block;
    }

    .select-text-hint {
      text-align: center;
      color: #999;
      font-size: 12px;
      padding: 20px;
      display: none;
    }

    .select-text-hint.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Sahaayak AI</h1>
    <p>सहायक AI - Scam Detector</p>
  </div>

  <div class="container">
    <div class="select-text-hint show">
      📝 Select text on any website and right-click to analyze
    </div>

    <div class="loading">
      ⏳ Analyzing your text...
    </div>

    <div class="error-box">
      ⚠️ <span id="error-text"></span>
    </div>

    <div id="result-box" class="result-box">
      <div id="result-status" class="result-status"></div>
      <div class="result-message" id="result-message"></div>
      <div class="result-score" id="result-score"></div>
      <button class="listen-button" id="listen-button" style="margin-top: 10px;">
        🔊 Listen Again
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
